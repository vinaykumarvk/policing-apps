map $http_x_platform_smoke_persona $platform_api_claim {
    default $pilot_claim;
    forensic $forensic_pilot_claim;
    analyst $social_media_pilot_claim;
    social-media $social_media_pilot_claim;
    io $knowledge_pilot_claim;
    knowledge $knowledge_pilot_claim;
}

upstream platform_web {
    server platform-web:5176;
}

upstream platform_api {
    server platform-api:8080;
}

upstream dopams_api {
    server dopams-api:8080;
}

upstream forensic_api {
    server forensic-api:8080;
}

upstream social_media_api {
    server social-media-api:8080;
}

upstream knowledge_api {
    server knowledge-api:8080;
}

upstream iqw_api {
    server iqw-api:8080;
}

map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

server {
    listen 8080;
    server_name policing-platform.local _;
    server_tokens off;

    # Local-only synthetic pilot claim. This profile proves route gating, not production identity.
    set $pilot_claim '{"schema_version":"platform.claims.v1","claim_version":1,"source":"platform-idp-local","source_version":"idp-seed-v1","subject":{"user_id":"user-platform-pilot-local","persona":"platform_pilot_operator","display_name":"Platform Pilot Operator","tenant_id":"punjab-police","org_id":"mohali-district"},"issued_at":"2026-07-01T18:40:00Z","expires_at":"2026-07-01T19:30:00Z","session_id":"sess-platform-pilot-local","modules":["dopams","iqw"],"domain_permissions":[{"domain":"dopams","permissions":["case:read","evidence:metadata-read"]},{"domain":"iqw","permissions":["complaint:read","task:queue-read"]}],"org":{"tenant_id":"punjab-police","org_id":"mohali-district","unit_ids":["narcotics-cell-mohali","desk-mohali"],"scope":"unit"},"jurisdiction":{"country":"IN","state":"PB","districts":["SAS Nagar"],"police_stations":["Phase-8"],"scope":"station"},"clearance":{"level":"confidential","compartments":["narcotics","casework","intake"]},"assignment":{"case_ids":["CASE-DOPAMS-001"],"queue_ids":["desk-mohali-intake"],"evidence_ids":["EVID-DOPAMS-001"],"jurisdiction_wide":false,"domain_wide":false},"purpose":{"allowed":["investigation","complaint_intake"]},"mfa":{"required":true,"verified":true,"methods":["totp"],"verified_at":"2026-07-01T18:39:00Z"}}';
    set $forensic_pilot_claim '{"schema_version":"platform.claims.v1","claim_version":1,"source":"platform-idp-local","source_version":"idp-seed-v1","subject":{"user_id":"user-forensic-pilot-local","persona":"forensic_analyst","display_name":"Forensic Analyst","tenant_id":"punjab-police","org_id":"forensic-lab"},"issued_at":"2026-07-01T18:40:00Z","expires_at":"2026-07-01T19:30:00Z","session_id":"sess-forensic-pilot-local","modules":["forensic"],"domain_permissions":[{"domain":"forensic","permissions":["evidence:metadata-read"]}],"org":{"tenant_id":"punjab-police","org_id":"forensic-lab","unit_ids":["digital-forensics"],"scope":"unit"},"jurisdiction":{"country":"IN","state":"PB","districts":["SAS Nagar"],"police_stations":[],"scope":"district"},"clearance":{"level":"secret","compartments":["digital_evidence","casework"]},"assignment":{"case_ids":["CASE-DOPAMS-001"],"queue_ids":["forensic-review"],"evidence_ids":["EVID-DOPAMS-001"],"jurisdiction_wide":false,"domain_wide":false},"purpose":{"allowed":["forensic_review"]},"mfa":{"required":true,"verified":true,"methods":["hardware_key"],"verified_at":"2026-07-01T18:39:00Z"}}';
    set $social_media_pilot_claim '{"schema_version":"platform.claims.v1","claim_version":1,"source":"platform-idp-local","source_version":"idp-seed-v1","subject":{"user_id":"user-social-media-pilot-local","persona":"analyst","display_name":"Intelligence Analyst","tenant_id":"punjab-police","org_id":"state-intelligence"},"issued_at":"2026-07-01T18:40:00Z","expires_at":"2026-07-01T19:30:00Z","session_id":"sess-social-media-pilot-local","modules":["social_media"],"domain_permissions":[{"domain":"social_media","permissions":["content:metadata-read","trend:read"]}],"org":{"tenant_id":"punjab-police","org_id":"state-intelligence","unit_ids":["analysis-cell"],"scope":"unit"},"jurisdiction":{"country":"IN","state":"PB","districts":["SAS Nagar"],"police_stations":[],"scope":"state"},"clearance":{"level":"confidential","compartments":["intelligence"]},"assignment":{"case_ids":[],"queue_ids":["analysis-state-feed"],"evidence_ids":[],"jurisdiction_wide":true,"domain_wide":false},"purpose":{"allowed":["intelligence_analysis","case_review"]},"mfa":{"required":true,"verified":true,"methods":["totp"],"verified_at":"2026-07-01T18:39:00Z"}}';
    set $knowledge_pilot_claim '{"schema_version":"platform.claims.v1","claim_version":1,"source":"platform-idp-local","source_version":"idp-seed-v1","subject":{"user_id":"user-knowledge-pilot-local","persona":"io","display_name":"Investigating Officer","tenant_id":"punjab-police","org_id":"mohali-district"},"issued_at":"2026-07-01T18:40:00Z","expires_at":"2026-07-01T19:30:00Z","session_id":"sess-knowledge-pilot-local","modules":["knowledge"],"domain_permissions":[{"domain":"knowledge","permissions":["query:case-summary"]}],"org":{"tenant_id":"punjab-police","org_id":"mohali-district","unit_ids":["narcotics-cell-mohali"],"scope":"unit"},"jurisdiction":{"country":"IN","state":"PB","districts":["SAS Nagar"],"police_stations":["Phase-8"],"scope":"station"},"clearance":{"level":"confidential","compartments":["narcotics","casework"]},"assignment":{"case_ids":["CASE-DOPAMS-001"],"queue_ids":["io-active"],"evidence_ids":["EVID-DOPAMS-001"],"jurisdiction_wide":false,"domain_wide":false},"purpose":{"allowed":["case_review"]},"mfa":{"required":true,"verified":true,"methods":["totp"],"verified_at":"2026-07-01T18:39:00Z"}}';

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Cache-Control "no-store" always;

    location = /health {
        default_type application/json;
        return 200 '{"status":"ok","profile":"platform-pilot-local","pilot_routes":["/domains/dopams","/domains/iqw","/domains/forensic","/domains/social-media","/domains/knowledge"],"planned_or_blocked":[]}';
    }

    location ^~ /api/v1/platform/ {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Correlation-ID $request_id;
        proxy_set_header X-Platform-Claims $platform_api_claim;
        proxy_set_header X-Platform-Claims-Verified "true";
        proxy_pass http://platform_api;
    }

    # Real SSO launch handoff: forwarded to platform-api itself (session cookie
    # intact, full path preserved) so its own launch-routes.ts can authenticate
    # the caller, evaluate entitlement, and 302 to the real DOPAMS UI with an SSO
    # token. No local redirect here — an 8080-vs-8088 return/proxy_pass mismatch
    # previously made nginx emit an absolute Location using its container-internal
    # listen port instead of the externally mapped host port.
    location ^~ /domains/dopams {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Correlation-ID $request_id;
        proxy_pass http://platform_api;
    }

    # Real SSO launch handoff — see /domains/dopams above. IQW establishes its
    # session server-side on officer-api's own GET /sso route (see
    # apps/api/src/routes/auth.routes.ts), then redirects to officer-ui.
    location ^~ /domains/iqw {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Correlation-ID $request_id;
        proxy_pass http://platform_api;
    }

    # Real SSO launch handoff — see /domains/dopams above.
    location ^~ /domains/forensic {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Correlation-ID $request_id;
        proxy_pass http://platform_api;
    }

    # Real SSO launch handoff — see /domains/dopams above.
    location ^~ /domains/social-media {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Correlation-ID $request_id;
        proxy_pass http://platform_api;
    }

    # Real launch handoff — see /domains/dopams above. Knowledge Search has no
    # SSO exchange endpoint (it's an external production app, not a local
    # pilot service), so launch-routes.ts falls back to a plain redirect.
    location ^~ /domains/knowledge {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Correlation-ID $request_id;
        proxy_pass http://platform_api;
    }

    # Unknown or non-pilot services are intentionally not routable here.
    location ^~ /domains/ {
        default_type application/json;
        return 404 '{"error":"PLATFORM_ROUTE_BLOCKED","message":"Only pilot-gated DOPAMS, IQW, Forensic, Social Media, and Knowledge routes are exposed by this local profile.","blocked":[]}';
    }

    location / {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_pass http://platform_web;
    }
}
