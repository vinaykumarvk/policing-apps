name: policing-platform-pilot

services:
  node-deps:
    image: node:22-alpine
    working_dir: /workspace
    command:
      - sh
      - -lc
      - |
        npm ci --include-workspace-root
        npm --workspace packages/authz run build
    volumes:
      - ../..:/workspace
      - platform_node_modules:/workspace/node_modules
    networks:
      - pilot-private
    restart: "no"

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: policing_platform
      POSTGRES_USER: policing
      POSTGRES_PASSWORD: policing-local-only
    volumes:
      - platform_pgvector_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U policing -d policing_platform"]
      interval: 5s
      timeout: 5s
      retries: 12
    networks:
      - pilot-private

  redis-queue:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - platform_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12
    networks:
      - pilot-private

  object-storage:
    image: minio/minio:latest
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: platform-local
      MINIO_ROOT_PASSWORD: platform-local-only
    volumes:
      - platform_object_data:/data
    networks:
      - pilot-private

  platform-api:
    image: node:22-alpine
    working_dir: /workspace
    environment:
      PORT: "8080"
      PLATFORM_LOCAL_NOW: "2026-07-01T18:45:00Z"
      DATABASE_URL: postgres://policing:policing-local-only@postgres:5432/policing_platform
      REDIS_URL: redis://redis-queue:6379/0
      OBJECT_STORAGE_ENDPOINT: http://object-storage:9000
    command:
      - sh
      - -lc
      - |
        cat > /tmp/platform-api-local.ts <<'TS'
        import { createServer } from "node:http";
        import { createPlatformApp } from "./apps/platform-api/src/app";

        const app = createPlatformApp({
          now: () => new Date(process.env.PLATFORM_LOCAL_NOW ?? "2026-07-01T18:45:00Z"),
        });
        const port = Number(process.env.PORT ?? 8080);

        createServer(async (req, res) => {
          try {
            const chunks: Buffer[] = [];
            for await (const chunk of req) {
              chunks.push(Buffer.isBuffer(chunk) ? chunk : Buffer.from(chunk));
            }
            const method = req.method ?? "GET";
            const body = method === "GET" || method === "HEAD" ? undefined : Buffer.concat(chunks);
            const protocol = req.headers["x-forwarded-proto"] ?? "http";
            const host = req.headers.host ?? "platform-api:" + port;
            const request = new Request(String(protocol) + "://" + host + (req.url ?? "/"), {
              method,
              headers: req.headers as HeadersInit,
              body,
            });
            const response = await app.fetch(request);
            res.statusCode = response.status;
            response.headers.forEach((value, key) => res.setHeader(key, value));
            const responseBody = Buffer.from(await response.arrayBuffer());
            res.end(responseBody);
          } catch {
            res.statusCode = 500;
            res.setHeader("content-type", "application/json");
            res.end(JSON.stringify({ error: { code: "LOCAL_PLATFORM_API_FAILED" } }));
          }
        }).listen(port, "0.0.0.0", () => {
          console.log("platform-api local wrapper listening on " + port);
        });
        TS
        npx tsx /tmp/platform-api-local.ts
    volumes:
      - ../..:/workspace
      - platform_node_modules:/workspace/node_modules
    depends_on:
      node-deps:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis-queue:
        condition: service_healthy
      object-storage:
        condition: service_started
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:8080/api/v1/platform/health').then(r=>{if(!r.ok)throw r.status}).catch(()=>process.exit(1))\"",
        ]
      interval: 5s
      timeout: 5s
      retries: 24
    networks:
      - pilot-private

  platform-web:
    image: node:22-alpine
    working_dir: /workspace
    environment:
      VITE_PLATFORM_API_BASE_URL: ""
      CHOKIDAR_USEPOLLING: "true"
    command:
      - sh
      - -lc
      - npm --workspace apps/platform-web run dev -- --host 0.0.0.0 --port 5176
    volumes:
      - ../..:/workspace
      - platform_node_modules:/workspace/node_modules
    depends_on:
      node-deps:
        condition: service_completed_successfully
      platform-api:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:5176/').then(r=>{if(!r.ok)throw r.status}).catch(()=>process.exit(1))\"",
        ]
      interval: 5s
      timeout: 5s
      retries: 24
    networks:
      - pilot-private

  dopams-api:
    image: node:22-alpine
    working_dir: /workspace
    environment:
      PORT: "8080"
      PLATFORM_LOCAL_NOW: "2026-07-01T18:45:00Z"
      DOPAMS_DATABASE_URL: postgres://policing:policing-local-only@postgres:5432/policing_platform
    command:
      - sh
      - -lc
      - |
        cat > /tmp/dopams-platform-gate.ts <<'TS'
        import { createServer } from "node:http";
        import { evaluateDopamsPlatformAuth } from "./apps/dopams-api/src/middleware/platform-auth";

        const port = Number(process.env.PORT ?? 8080);
        const now = () => new Date(process.env.PLATFORM_LOCAL_NOW ?? "2026-07-01T18:45:00Z");

        createServer(async (req, res) => {
          const claimsHeader = Array.isArray(req.headers["x-platform-claims"])
            ? req.headers["x-platform-claims"][0]
            : req.headers["x-platform-claims"];
          let claims: unknown = undefined;
          let claimsParseError: string | undefined;
          if (claimsHeader) {
            try {
              claims = JSON.parse(claimsHeader);
            } catch {
              claimsParseError = "x-platform-claims must be valid JSON";
            }
          }
          const decision = evaluateDopamsPlatformAuth(
            {
              claims,
              claimsParseError,
              serverVerified: req.headers["x-platform-claims-verified"] === "true",
              servicePath: req.url ?? "/domains/dopams",
              correlationId:
                String(req.headers["x-correlation-id"] ?? req.headers["x-request-id"] ?? "dopams-local-smoke"),
            },
            { now },
          );
          res.statusCode = decision.allowed ? 200 : 403;
          res.setHeader("content-type", "application/json");
          res.end(
            JSON.stringify({
              service: "dopams-api",
              profile: "platform-pilot-local",
              gate_evidence_ref: decision.evidence.gate_evidence_ref,
              platform_auth: decision.evidence,
            }),
          );
        }).listen(port, "0.0.0.0", () => {
          console.log("dopams-api platform gate harness listening on " + port);
        });
        TS
        npx tsx /tmp/dopams-platform-gate.ts
    volumes:
      - ../..:/workspace
      - platform_node_modules:/workspace/node_modules
    depends_on:
      node-deps:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:8080/health').then(r=>{if(r.status!==403)throw r.status}).catch(()=>process.exit(1))\"",
        ]
      interval: 5s
      timeout: 5s
      retries: 24
    networks:
      - pilot-private

