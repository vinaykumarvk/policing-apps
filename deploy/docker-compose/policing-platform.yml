name: policing-platform-pilot

services:
  node-deps:
    image: node:22-alpine
    working_dir: /workspace
    command:
      - sh
      - -lc
      - |
        npm ci --include-workspace-root
        npm --workspace packages/authz run build
        npm --workspace packages/api-core run build
        npm --workspace packages/api-integrations run build
        npm --workspace packages/workflow-engine run build
        npm --workspace packages/shared run build
    volumes:
      - ../..:/workspace
      - platform_node_modules:/workspace/node_modules
    networks:
      - pilot-private
    restart: "no"

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: policing_platform
      POSTGRES_USER: policing
      POSTGRES_PASSWORD: policing-local-only
    volumes:
      - platform_pgvector_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U policing -d policing_platform"]
      interval: 5s
      timeout: 5s
      retries: 12
    networks:
      - pilot-private

  redis-queue:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - platform_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12
    networks:
      - pilot-private

  object-storage:
    image: minio/minio:latest
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: platform-local
      MINIO_ROOT_PASSWORD: platform-local-only
    volumes:
      - platform_object_data:/data
    networks:
      - pilot-private

  platform-api:
    image: node:22-alpine
    working_dir: /workspace
    environment:
      PORT: "8080"
      DATABASE_URL: postgres://policing:policing-local-only@postgres:5432/policing_platform
      REDIS_URL: redis://redis-queue:6379/0
      OBJECT_STORAGE_ENDPOINT: http://object-storage:9000
      # DEMO MODE ONLY — pilot-local secrets/credentials, never used against real data.
      PLATFORM_SESSION_SECRET: platform-session-pilot-dev-secret-0001
      PLATFORM_DEMO_TOTP_CODE: "000000"
      PLATFORM_DEMO_ADMIN_PASSWORD: password123
      PLATFORM_PROJECTION_TTL_SECONDS: "31536000"
      PLATFORM_SSO_SECRET: platform-sso-pilot-dev-secret-0001
      PLATFORM_LAUNCH_TARGETS: '{"dopams":"http://localhost:5175","forensic":"http://localhost:5178","social-media":"http://localhost:5177","knowledge":"https://police-case-history.adssoftek.com","iqw":"http://localhost:3013"}'
    command:
      - sh
      - -lc
      - |
        npx tsx apps/platform-api/src/migrate-runner.ts
        exec npx tsx apps/platform-api/src/server.ts
    volumes:
      - ../..:/workspace
      - platform_node_modules:/workspace/node_modules
    depends_on:
      node-deps:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis-queue:
        condition: service_healthy
      object-storage:
        condition: service_started
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:8080/api/v1/platform/health').then(r=>{if(!r.ok)throw r.status}).catch(()=>process.exit(1))\"",
        ]
      interval: 5s
      timeout: 5s
      retries: 24
    networks:
      - pilot-private

  platform-web:
    image: node:22-alpine
    working_dir: /workspace
    environment:
      VITE_PLATFORM_API_BASE_URL: ""
      CHOKIDAR_USEPOLLING: "true"
    command:
      - sh
      - -lc
      - npm --workspace apps/platform-web run dev -- --host 0.0.0.0 --port 5176
    volumes:
      - ../..:/workspace
      - platform_node_modules:/workspace/node_modules
    depends_on:
      node-deps:
        condition: service_completed_successfully
      platform-api:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:5176/').then(r=>{if(!r.ok)throw r.status}).catch(()=>process.exit(1))\"",
        ]
      interval: 5s
      timeout: 5s
      retries: 24
    networks:
      - pilot-private

  dopams-api:
    image: node:22-alpine
    working_dir: /workspace/apps/dopams-api
    environment:
      PORT: "8080"
      NODE_ENV: "development"
      DATABASE_SSL: "false"
      DOPAMS_DATABASE_URL: postgres://policing:policing-local-only@postgres:5432/dopams
      JWT_SECRET: dopams-local-dev-secret
      ALLOWED_ORIGINS: http://localhost:5175
      PLATFORM_SSO_SECRET: platform-sso-pilot-dev-secret-0001
      PLATFORM_SSO_FALLBACK_USER: admin
    command: ["npx", "tsx", "src/index.ts"]
    volumes:
      - ../..:/workspace
      - platform_node_modules:/workspace/node_modules
    depends_on:
      node-deps:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:8080/health').then(r=>{if(!r.ok)throw r.status}).catch(()=>process.exit(1))\"",
        ]
      interval: 5s
      timeout: 5s
      retries: 24
    networks:
      - pilot-private
      - pilot-public
    ports:
      - "3011:8080"

  dopams-ui:
    image: node:22-alpine
    working_dir: /workspace/apps/dopams-ui
    environment:
      VITE_API_BASE_URL: http://localhost:3011
      CHOKIDAR_USEPOLLING: "true"
    command: ["npx", "vite", "--host", "0.0.0.0", "--port", "5175", "--strictPort"]
    volumes:
      - ../..:/workspace
      - platform_node_modules:/workspace/node_modules
    depends_on:
      node-deps:
        condition: service_completed_successfully
      dopams-api:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:5175/').then(r=>{if(!r.ok)throw r.status}).catch(()=>process.exit(1))\"",
        ]
      interval: 5s
      timeout: 5s
      retries: 24
    networks:
      - pilot-private
      - pilot-public
    ports:
      - "5175:5175"

  forensic-api:
    image: node:22-alpine
    working_dir: /workspace/apps/forensic-api
    environment:
      PORT: "8080"
      NODE_ENV: "development"
      DATABASE_SSL: "false"
      FORENSIC_DATABASE_URL: postgres://policing:policing-local-only@postgres:5432/forensic
      JWT_SECRET: forensic-local-dev-secret
      ALLOWED_ORIGINS: http://localhost:5178
      PLATFORM_SSO_SECRET: platform-sso-pilot-dev-secret-0001
      PLATFORM_SSO_FALLBACK_USER: admin
    command: ["npx", "tsx", "src/index.ts"]
    volumes:
      - ../..:/workspace
      - platform_node_modules:/workspace/node_modules
    depends_on:
      node-deps:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:8080/health').then(r=>{if(!r.ok)throw r.status}).catch(()=>process.exit(1))\"",
        ]
      interval: 5s
      timeout: 5s
      retries: 24
    networks:
      - pilot-private
      - pilot-public
    ports:
      - "3012:8080"

  forensic-ui:
    image: node:22-alpine
    working_dir: /workspace/apps/forensic-ui
    environment:
      VITE_API_BASE_URL: http://localhost:3012
      CHOKIDAR_USEPOLLING: "true"
    command: ["npx", "vite", "--host", "0.0.0.0", "--port", "5178", "--strictPort"]
    volumes:
      - ../..:/workspace
      - platform_node_modules:/workspace/node_modules
    depends_on:
      node-deps:
        condition: service_completed_successfully
      forensic-api:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:5178/').then(r=>{if(!r.ok)throw r.status}).catch(()=>process.exit(1))\"",
        ]
      interval: 5s
      timeout: 5s
      retries: 24
    networks:
      - pilot-private
      - pilot-public
    ports:
      - "5178:5178"

  social-media-api:
    image: node:22-alpine
    working_dir: /workspace/apps/social-media-api
    environment:
      PORT: "8080"
      NODE_ENV: "development"
      DATABASE_SSL: "false"
      SM_DATABASE_URL: postgres://policing:policing-local-only@postgres:5432/social_media
      JWT_SECRET: sm-local-dev-secret
      ALLOWED_ORIGINS: http://localhost:5177
      PLATFORM_SSO_SECRET: platform-sso-pilot-dev-secret-0001
      PLATFORM_SSO_FALLBACK_USER: admin
    command: ["npx", "tsx", "src/index.ts"]
    volumes:
      - ../..:/workspace
      - platform_node_modules:/workspace/node_modules
    depends_on:
      node-deps:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:8080/health').then(r=>{if(!r.ok)throw r.status}).catch(()=>process.exit(1))\"",
        ]
      interval: 5s
      timeout: 5s
      retries: 24
    networks:
      - pilot-private
      - pilot-public
    ports:
      - "3004:8080"

  social-media-ui:
    image: node:22-alpine
    working_dir: /workspace/apps/social-media-ui
    environment:
      VITE_API_BASE_URL: http://localhost:3004
      CHOKIDAR_USEPOLLING: "true"
    command: ["npx", "vite", "--host", "0.0.0.0", "--port", "5177", "--strictPort"]
    volumes:
      - ../..:/workspace
      - platform_node_modules:/workspace/node_modules
    depends_on:
      node-deps:
        condition: service_completed_successfully
      social-media-api:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:5177/').then(r=>{if(!r.ok)throw r.status}).catch(()=>process.exit(1))\"",
        ]
      interval: 5s
      timeout: 5s
      retries: 24
    networks:
      - pilot-private
      - pilot-public
    ports:
      - "5177:5177"

  knowledge-api:
    image: node:22-alpine
    working_dir: /workspace
    environment:
      PORT: "8080"
      PLATFORM_LOCAL_NOW: "2026-07-01T18:45:00Z"
    command:
      - sh
      - -lc
      - |
        cat > /tmp/knowledge-platform-gate.ts <<'TS'
        import { createServer } from "node:http";
        import { evaluateKnowledgePlatformAuth } from "/workspace/domains/knowledge/api/src/platform-auth";

        const port = Number(process.env.PORT ?? 8080);
        const now = () => new Date(process.env.PLATFORM_LOCAL_NOW ?? "2026-07-01T18:45:00Z");

        createServer(async (req, res) => {
          const claimsHeader = Array.isArray(req.headers["x-platform-claims"])
            ? req.headers["x-platform-claims"][0]
            : req.headers["x-platform-claims"];
          let claims: unknown = undefined;
          let claimsParseError: string | undefined;
          if (claimsHeader) {
            try {
              claims = JSON.parse(claimsHeader);
            } catch {
              claimsParseError = "x-platform-claims must be valid JSON";
            }
          }
          const decision = evaluateKnowledgePlatformAuth(
            {
              claims,
              claimsParseError,
              serverVerified: req.headers["x-platform-claims-verified"] === "true",
              servicePath: req.url ?? "/domains/knowledge",
              correlationId:
                String(req.headers["x-correlation-id"] ?? req.headers["x-request-id"] ?? "knowledge-local-smoke"),
            },
            { now },
          );
          res.statusCode = decision.allowed ? 200 : 403;
          res.setHeader("content-type", "application/json");
          res.end(
            JSON.stringify({
              service: "knowledge-api",
              profile: "platform-pilot-local",
              gate_evidence_ref: decision.evidence.gate_evidence_ref,
              platform_auth: decision.evidence,
            }),
          );
        }).listen(port, "0.0.0.0", () => {
          console.log("knowledge-api platform gate harness listening on " + port);
        });
        TS
        npx tsx /tmp/knowledge-platform-gate.ts
    volumes:
      - ../..:/workspace
      - platform_node_modules:/workspace/node_modules
    depends_on:
      node-deps:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:8080/health').then(r=>{if(r.status!==403)throw r.status}).catch(()=>process.exit(1))\"",
        ]
      interval: 5s
      timeout: 5s
      retries: 24
    networks:
      - pilot-private

  iqw-api:
    image: python:3.12-alpine
    working_dir: /workspace
    environment:
      PORT: "8080"
      PLATFORM_LOCAL_NOW: "2026-07-01T18:45:00+00:00"
    command:
      - sh
      - -lc
      - |
        python - <<'PY'
        import json
        import os
        import sys
        from datetime import datetime, timezone
        from http.server import BaseHTTPRequestHandler, HTTPServer

        sys.path.insert(0, "/workspace/domains/iqw-api/src/middleware")
        from platform_auth import evaluate_iqw_platform_auth

        local_now = datetime.fromisoformat(os.getenv("PLATFORM_LOCAL_NOW", "2026-07-01T18:45:00+00:00"))
        if local_now.tzinfo is None:
          local_now = local_now.replace(tzinfo=timezone.utc)

        class Handler(BaseHTTPRequestHandler):
          def do_GET(self):
            raw_claims = self.headers.get("x-platform-claims")
            claims = None
            parse_error = None
            if raw_claims:
              try:
                claims = json.loads(raw_claims)
              except json.JSONDecodeError:
                parse_error = "x-platform-claims must be valid JSON"
            decision = evaluate_iqw_platform_auth(
              claims=claims,
              claims_parse_error=parse_error,
              server_verified=self.headers.get("x-platform-claims-verified") == "true",
              now=local_now,
              service_path=self.path,
              correlation_id=self.headers.get("x-correlation-id") or self.headers.get("x-request-id") or "iqw-local-smoke",
            )
            body = json.dumps({
              "service": "iqw-api",
              "profile": "platform-pilot-local",
              "gate_evidence_ref": decision["evidence"]["gate_evidence_ref"],
              "platform_auth": decision["evidence"],
            }).encode("utf-8")
            self.send_response(200 if decision["allowed"] else 403)
            self.send_header("content-type", "application/json")
            self.send_header("content-length", str(len(body)))
            self.end_headers()
            self.wfile.write(body)

          def log_message(self, _format, *_args):
            return

        port = int(os.getenv("PORT", "8080"))
        HTTPServer(("0.0.0.0", port), Handler).serve_forever()
        PY
    volumes:
      - ../..:/workspace:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python - <<'PY'\nimport urllib.error, urllib.request\ntry:\n  urllib.request.urlopen('http://127.0.0.1:8080/health', timeout=2)\n  raise SystemExit(1)\nexcept urllib.error.HTTPError as exc:\n  raise SystemExit(0 if exc.code == 403 else 1)\nPY",
        ]
      interval: 5s
      timeout: 5s
      retries: 24
    networks:
      - pilot-private

  officer-api:
    image: node:22-alpine
    working_dir: /workspace/apps/api
    environment:
      PORT: "3001"
      NODE_ENV: "development"
      DATABASE_SSL: "false"
      DATABASE_URL: postgres://policing:policing-local-only@postgres:5432/officer
      JWT_SECRET: officer-local-dev-secret
      ALLOWED_ORIGINS: http://localhost:5174
      PLATFORM_SSO_SECRET: platform-sso-pilot-dev-secret-0001
      PLATFORM_SSO_FALLBACK_USER: officer1
      PLATFORM_SSO_IQW_UI_URL: http://localhost:5174/
    command: ["npx", "tsx", "src/index.ts"]
    volumes:
      - ../..:/workspace
      - platform_node_modules:/workspace/node_modules
    depends_on:
      node-deps:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3001/health').then(r=>{if(!r.ok)throw r.status}).catch(()=>process.exit(1))\"",
        ]
      interval: 5s
      timeout: 5s
      retries: 24
    networks:
      - pilot-private
      - pilot-public
    ports:
      - "3013:3001"

  officer-ui:
    image: node:22-alpine
    working_dir: /workspace/apps/officer
    environment:
      VITE_API_BASE_URL: http://localhost:3013
      CHOKIDAR_USEPOLLING: "true"
    command: ["npx", "vite", "--host", "0.0.0.0", "--port", "5174", "--strictPort"]
    volumes:
      - ../..:/workspace
      - platform_node_modules:/workspace/node_modules
    depends_on:
      node-deps:
        condition: service_completed_successfully
      officer-api:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:5174/').then(r=>{if(!r.ok)throw r.status}).catch(()=>process.exit(1))\"",
        ]
      interval: 5s
      timeout: 5s
      retries: 24
    networks:
      - pilot-private
      - pilot-public
    ports:
      - "5174:5174"

  platform-proxy:
    image: nginx:1.27-alpine
    ports:
      - "${POLICING_PLATFORM_PORT:-8088}:8080"
    volumes:
      - ../nginx/policing-platform.local.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      platform-web:
        condition: service_healthy
      platform-api:
        condition: service_healthy
      dopams-api:
        condition: service_healthy
      forensic-api:
        condition: service_healthy
      social-media-api:
        condition: service_healthy
      knowledge-api:
        condition: service_healthy
      iqw-api:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --quiet --tries=1 --spider http://127.0.0.1:8080/health || exit 1",
        ]
      interval: 5s
      timeout: 5s
      retries: 24
    networks:
      - pilot-private
      - pilot-public

networks:
  pilot-public:
  pilot-private:
    internal: true

volumes:
  platform_node_modules:
  platform_pgvector_data:
  platform_redis_data:
  platform_object_data:
